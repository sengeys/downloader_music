name: Build Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Download yt-dlp binary
        run: |
          mkdir -p assets/bin/macos
          curl -L -o assets/bin/macos/yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
          chmod +x assets/bin/macos/yt-dlp

      - name: Download ffmpeg binary
        run: |
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip
          unzip ffmpeg.zip -d assets/bin/macos/
          chmod +x assets/bin/macos/ffmpeg

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Zip the .app
        run: |
          cd build/macos/Build/Products/Release/
          zip -r downloader_music_macos.zip downloader_music.app

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/macos/Build/Products/Release/downloader_music_macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloader_music-macos
          path: build/macos/Build/Products/Release/downloader_music_macos.zip

  # *** Job ថ្មីសម្រាប់ Windows ***
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Download yt-dlp binary
        run: |
          mkdir -p assets/bin/windows
          curl -L -o assets/bin/windows/yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
        shell: bash

      - name: Download ffmpeg binary
        run: |
          curl -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          unzip ffmpeg.zip -d ffmpeg_temp
          FFMPEG_DIR=$(find ffmpeg_temp -name "ffmpeg.exe" -exec dirname {} \;)
          cp "$FFMPEG_DIR/ffmpeg.exe" assets/bin/windows/ffmpeg.exe
        shell: bash

      # *** Step ថ្មីត្រូវបន្ថែម ***
      - name: Create placeholder folders for unused assets
        run: |
          mkdir -p assets/bin/macos
          mkdir -p assets/images
          touch assets/bin/macos/.gitkeep
          touch assets/images/.gitkeep
        shell: bash

      - run: flutter pub get
      - run: flutter build windows --release